name: flutter_test_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  shared_preferences: ^2.3.5
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.16
  http: ^1.3.0
  shimmer: ^3.0.0
  lottie: ^3.2.0
  cached_network_image: ^3.4.1
  mime_type: ^1.0.1
  logger: ^2.5.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  flutter_gen_runner: ^5.7.0

flutter_gen:
  output: lib/assets_path/
  line_length: 80
  integrations:
    flutter_svg: true
    lottie: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/lotties/